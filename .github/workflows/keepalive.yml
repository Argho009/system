name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          "${{ secrets.SUPABASE_URL }}/rest/v1/system_config?select=key" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase ping status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "WARNING: Supabase ping failed with status $STATUS"
            exit 1
          fi
          echo "Supabase is alive and responding"
